<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>JS STATE TRACKER</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        :root { 
            --bg: #050505; 
            --accent: #00ff88; /* Neon Green */
            --danger: #ff0000; 
            --panel: rgba(15, 15, 15, 0.98); 
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* --- SPEED MENU STYLE PANEL --- */
        #data-panel {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: var(--panel); border-top: 3px solid var(--accent);
            border-radius: 25px 25px 0 0; padding: 25px;
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 1000; color: white; box-shadow: 0 -10px 40px rgba(0,0,0,1);
            backdrop-filter: blur(15px);
        }
        .active { bottom: 0 !important; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title { color: var(--accent); font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        
        .box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 10px; }
        .label { color: #555; font-size: 10px; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .val { font-size: 15px; font-weight: bold; color: #fff; }
        .name-val { color: var(--accent); font-size: 18px; }

        #close-btn { background: var(--danger); color: #fff; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Cluster Styling */
        .marker-cluster-small { background-color: rgba(255, 0, 0, 0.4); }
        .marker-cluster-small div { background-color: rgba(255, 0, 0, 0.8); color: white; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="data-panel">
        <div class="header">
            <span class="title">SPOILER TRACKER V1.0</span>
            <button id="close-btn" onclick="closePanel()">CLOSE X</button>
        </div>
        
        <div class="box">
            <span class="label">LEGAL NAME</span>
            <div id="p-name" class="val name-val">---</div>
        </div>

        <div class="box">
            <span class="label">CRIME / OFFENSE</span>
            <div id="p-crime" class="val" style="color: var(--danger);">---</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="box">
                <span class="label">YEAR</span>
                <div id="p-year" class="val">---</div>
            </div>
            <div class="box">
                <span class="label">COUNTY / CITY</span>
                <div id="p-loc" class="val">---</div>
            </div>
        </div>
    </div>

<script>
    let map;
    const markers = L.markerClusterGroup();
    
    // STATEWIDE DATA (Ohio Examples)
    const stateData = [
        { lat: 39.9821, lng: -81.5312, name: "Jordan A. Miller", crime: "Sexual Battery", year: "2019", loc: "Byesville" },
        { lat: 39.9855, lng: -81.5385, name: "Marcus T. Thorne", crime: "Child Endangerment", year: "2021", loc: "Byesville" },
        { lat: 40.0300, lng: -81.5800, name: "Robert Smith", crime: "Sexual Predator", year: "2015", loc: "Cambridge" },
        { lat: 39.9612, lng: -82.9988, name: "David Wilson", crime: "Aggravated Assault", year: "2022", loc: "Columbus" },
        { lat: 41.4993, lng: -81.6944, name: "Michael Johnson", crime: "Tier 3 Offender", year: "2023", loc: "Cleveland" }
    ];

    function init() {
        // Initial center on Ohio
        map = L.map('map', { zoomControl: false }).setView([40.4173, -82.9071], 7);

        // Professional Dark Map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        stateData.forEach(p => {
            let marker = L.circleMarker([p.lat, p.lng], {
                color: 'red', fillColor: 'red', fillOpacity: 0.8, radius: 9
            });

            marker.on('click', () => {
                document.getElementById('p-name').innerText = p.name.toUpperCase();
                document.getElementById('p-crime').innerText = p.crime.toUpperCase();
                document.getElementById('p-year').innerText = p.year;
                document.getElementById('p-loc').innerText = p.loc;
                document.getElementById('data-panel').classList.add('active');
            });

            markers.addLayer(marker);
        });

        map.addLayer(markers);

        // Auto-Zoom to Byesville/Your Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const userLoc = [pos.coords.latitude, pos.coords.longitude];
                L.circleMarker(userLoc, { color: '#00ff88', radius: 6, weight: 3 }).addTo(map);
                map.flyTo(userLoc, 14);
            });
        }
    }

    function closePanel() {
        document.getElementById('data-panel').classList.remove('active');
    }

    window.onload = init;
</script>

</body>
</html>
